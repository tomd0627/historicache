name: Ping Supabase — HistoriCache

on:
  schedule:
    - cron: '0 9 * * 1,4'  # Every Monday & Thursday at 9am UTC
  workflow_dispatch:        # Manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Supabase client
        run: npm install @supabase/supabase-js

      - name: Ping database
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          node -e "
          const { createClient } = require('@supabase/supabase-js');
          const supabase = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_ANON_KEY);
          supabase.from('sites').select('id').limit(1).then(({ error }) => {
            if (error) { console.error('Ping failed:', error.message); process.exit(1); }
            console.log('Ping successful — HistoriCache is alive.');
          });
          "
